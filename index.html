<!DOCTYPE html>
<html lang="en">
    <head>
    
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/responsivity.css" />
		<title>Meme</title>
	
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:
    ital,wght@0,400..700;1,400..700&family=Oswald:wght@200..700&
    family=Playwrite+AU+VIC+Guides&display=swap" rel="stylesheet">


    </head>
    <body onload="onInit()">
    
    <header>
    <img src="LOGO.png" alt="">
    <div class="header-btns">
        <button onclick="onSwitchPage1(this)">Gllery Images</button>
        <button onclick="onSwitchPage2(this)">Edit Image</button>
    </div>
    </header>
    
    <section class="editor">
    <div class="canvas-container">
    <canvas class="canvas" width="500px" height="450px" onmousedown="onSwitchLine(event)"></canvas>
     </div>

    <div class="editor-text">
        
    <input class="text-input" type="text" oninput="onChangeText(this.value)" placeholder="Enter Text" />
    
    
    <div class="lines-buttons">
    <button onclick="onSwitchLine(event)">
    <img src="ICONS/up-and-down-opposite-double-arrows-side-by-side.png" alt="">
    </button>  
    <button onclick="onAddLine()"><img src="ICONS/add.png" alt=""></button>
    <button onclick="onDeleatLine()"><img src="ICONS/trash.png" alt=""></button>
    </div>

    <div class="txt-editor">
     
    
    <div class="font-size">
       <button id="minus" class="font-size-buttons" onclick="onChangeSize('-')">-</button>
       <span>F</span>
       <button class="font-size-buttons" onclick="onChangeSize('+')">+</button>
    </div>
       
    <button class="font-align" onclick="onChangePlace('left')">
        <img src="ICONS/align-to-left.png" alt="">
    </button>
    <button class="font-align" onclick="onChangePlace('center')">
        <img src="ICONS/center-text-alignment.png" alt="">
    </button>
    <button class="font-align" onclick="onChangePlace('right')">
        <img src="ICONS/align-to-right.png" alt="">
    </button>

    <select onchange="onCangeFont(this.value)" name="Font Type" id="font-type">
    <option value="Arimo">Arimo</option>
    <option value="Playwrite AU VIC Guides">Playwrite</option>
    <option value="Oswald">Oswald</option>
    </select>
    
    <button class="font-align" onclick="onStroke()"><img src="ICONS/text stroke.png"></button>
    <input class="color-input" type="color" onchange="onChangeColor(this.value)"/> 
    
    </div>
    
    <div class="icons">
        <button onclick="onErrow('left')"><</button>
        <div><img onclick="onIcon(this)" src="icons-png/smiley1.png" alt=""></div>
        <div><img onclick="onIcon(this)" src="icons-png/smiley2.png" alt=""></div>
        <div><img onclick="onIcon(this)" src="icons-png/smiley3.png" alt=""></div>
        <div><img onclick="onIcon(this)" src="icons-png/smiley4.png" alt=""></div>
        <button onclick="onErrow('right')">></button>
    </div>
     
    <div class="canvas-div">
    <a href="#" class="download-link" download="my-meme" onclick="downloadMeme(this)">Download</a>
    <button class="bottom-btns" onclick="onSave()">Save Image</button>
    <button class="bottom-btns" onclick="onLoad()">Restart</button>
    </div>
   

    </div>
    </section>

    <section class="gallery">
        <div class="gallery2">
        <h2>Gallery</h2>  
        <div>
            <button>Humans</button>
            <button>Babys</button>
            <button>Animals</button>
            <button>Others</button>
        </div>
        </div>
    <div class="gallery-container"></div>
    </section>

    <footer>
     <div>   
     <img src="LOGO.png" alt="">
     <p>All rights reserved 2026</p>
     </div>
    </footer>

    <script src="js/util.js"></script>
    <script src="js/galleryController.js"></script>
    <script src="js/meme-service.js"></script>
    <script src="js/meme-controler.js"></script>


    </body>  

</html>
