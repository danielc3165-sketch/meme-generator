<!DOCTYPE html>
<html lang="en">
    <head>
    
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="main.css" />
		<title>Meme</title>
	
    </head>
    <body onload="onInit()">
    
    <header>
    <h1>Meme Generator</h1>
    </header>


    <canvas class="canvas" width="500" height="500"></canvas>
    

    <div class="input-container">
    <input class="text-input" type="text" oninput="onChangeText(this.value)" placeholder="Enter Text" />
    <input class="color-input" type="color"/> 
    </div>
     
    <a href="#" class="download-link" download="my-meme" onclick="downloadMeme(this)">Download Picture</a>


    <section class="editor">
        <h2>Editor</h2>
    </section>

    <section class="gallery">
    <div class="gallery-container"></div>
    </section>




<script src="meme-controler.js"></script>
<script src="meme-service.js"></script>
<script src="galleryController.js"></script>

    </body>  

</html>
